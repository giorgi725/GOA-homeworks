<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>

    <script src="script.js">
        // Json - JavaScript Object Notation
        // 1 - ცოტა მეხსიერებას იკავებს და ინფორმაციის მარტივად გადაადგილებლად ვიყენებთ
        // 2 - მარტივად საკითხავი/ჩასაწერია
        // 3 - თითქმის ყველა ბიბლიოთეკა აქვს 
        let data = `[
            {
                "academy": "Goal Oriented Academy",
                "student": 10000,
                "CEO": "Nika Keshelava",
                "Group-88-is-best": true
            },
            {
                "academy": "idk",
                "student": 23,
                "CEO": noOne,
            }
        ]`
        // JSON.stringify(data) - მონაცემთა ტიპები გადაყავს string ად
        // JSON. parse(data) - უბრალო string ს გარდაქმნის js ის მონაცემებად
        console.log(localStorage.setItem("academy", JSON.stringify(data)))
        console.log(JSON.parse(localStorage.getItem("academy")))
    </script>
</body>
</html>
